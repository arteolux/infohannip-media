name: Decode media uploads

on:
  push:
    paths:
      - '_uploads/**/*.b64'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decode:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Decode base64 media files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets
          shopt -s nullglob
          changed=0
          for f in _uploads/*.b64; do
            name="$(basename "$f" .b64)"
            base64 -d "$f" > "assets/$name"
            changed=1
          done
          if [ "$changed" -eq 0 ]; then
            echo "No base64 upload files found."
          fi

      - name: Commit decoded assets
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets
          if git diff --cached --quiet; then
            echo "No decoded asset changes to commit."
          else
            git commit -m "Decode media assets"
            git push
          fi
